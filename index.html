<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FIFA World Cup 2026 – Predictions</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;
  --card:#0d1120;
  --card2:#141b2e;
  --border:#1c2540;
  --border2:#263055;
  --text:#eef0f8;
  --muted:#6a7a9e;
  --faint:#1c2540;
  --green:#22c55e;--green-bg:#041a0c;--green-border:#0b3818;
  --blue:#3b82f6;--blue-bg:#041128;--blue-border:#0b2452;
  --amber:#f59e0b;--amber-bg:#180e00;--amber-border:#3a2400;
  --red:#ef4444;--red-bg:#160404;--red-border:#380b0b;
  --purple:#a855f7;
  --wc-blue:#003DA5;
  --wc-red:#C8102E;
  --wc-gold:#F5C842;
  --radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

/* ── HEADER ──────────────────────────────────────────────────── */
header{
  background:linear-gradient(135deg,#001560 0%,#003DA5 45%,#011f7a 75%,#001060 100%);
  border-bottom:2px solid var(--wc-gold);
  padding:10px 18px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:200;flex-wrap:wrap;
  box-shadow:0 4px 24px rgba(0,30,140,.55);
}
.logo-badge{display:flex;align-items:center;gap:10px;text-decoration:none}
.wc-logo{width:46px;height:46px;flex-shrink:0}
.logo-text{display:flex;flex-direction:column;line-height:1.1}
.logo-text .l1{font-size:9px;font-weight:700;color:rgba(255,255,255,.6);letter-spacing:.2em;text-transform:uppercase}
.logo-text .l2{font-size:19px;font-weight:900;color:#fff;letter-spacing:-.5px}
.logo-text .l2 span{color:var(--wc-gold)}
.logo-text .l3{font-size:9px;color:rgba(255,255,255,.45);letter-spacing:.04em}
.hright{margin-left:auto;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.btn{background:var(--wc-gold);color:#000;font-weight:700;font-size:12px;padding:6px 13px;border-radius:6px;border:none;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn.ghost{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);font-size:11px}
.btn.ghost:hover{background:rgba(255,255,255,.18);color:#fff}
.status-pill{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.5);background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.1);padding:4px 10px;border-radius:20px}
.dot{width:7px;height:7px;border-radius:50%;background:#444;flex-shrink:0;transition:all .3s}
.dot.live{background:#22c55e;box-shadow:0 0 6px #22c55e}
.dot.err{background:var(--red)}
.refresh-note{font-size:10px;color:rgba(255,255,255,.35)}

/* ── LAYOUT ─────────────────────────────────────────────────── */
main{max-width:1180px;margin:0 auto;padding:20px 16px}
.sec{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}

/* ── KPIs ────────────────────────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(115px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;text-align:center;position:relative;overflow:hidden;transition:border-color .2s}
.kpi:hover{border-color:var(--border2)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.kpi.g::before{background:linear-gradient(90deg,var(--green),#16a34a)}
.kpi.b::before{background:linear-gradient(90deg,var(--blue),#1d4ed8)}
.kpi.a::before{background:linear-gradient(90deg,var(--amber),#d97706)}
.kpi.r::before{background:linear-gradient(90deg,var(--red),#b91c1c)}
.kpi.p::before{background:linear-gradient(90deg,var(--purple),#7c3aed)}
.kpi.wg::before{background:linear-gradient(90deg,var(--wc-gold),#d4a000)}
.kpi .v{font-size:23px;font-weight:900;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi .l{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.07em}
.g{color:var(--green)}.b{color:var(--blue)}.a{color:var(--amber)}.r{color:var(--red)}.p{color:var(--purple)}

/* ── GRID ────────────────────────────────────────────────────── */
.two{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.two-24{display:grid;grid-template-columns:2fr 4fr;gap:16px;margin-bottom:20px}
.three{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
@media(max-width:800px){.two{grid-template-columns:1fr}.two-24{grid-template-columns:1fr}}
@media(max-width:600px){.three{grid-template-columns:repeat(2,1fr)}}
@media(max-width:400px){.three,.kpi-row{grid-template-columns:repeat(2,1fr)}}

/* ── LEADERBOARD ─────────────────────────────────────────────── */
.lb{display:flex;flex-direction:column;gap:2px}
.lbr{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;cursor:default;transition:background .15s;position:relative;border:1px solid transparent}
.lbr:hover{background:var(--card2);border-color:var(--border)}
.lbr.leader{background:rgba(245,200,66,.05);border-color:rgba(245,200,66,.15)}
.rnk{font-size:13px;font-weight:700;width:24px;text-align:center;flex-shrink:0;color:var(--muted)}
.rnk.top{color:var(--amber)}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;letter-spacing:-.5px}
.pname{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pdet{font-size:10px;color:var(--muted);display:flex;gap:5px;margin-top:2px;flex-wrap:wrap;align-items:center}
.form-dots{display:flex;gap:2px;margin-top:4px}
.fd{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.fd.pos{background:var(--green)}
.fd.neg{background:var(--red)}
.fd.zer{background:#4a5580}
.fd.null{background:var(--faint)}
.barw{height:3px;background:var(--border2);border-radius:2px;overflow:hidden;margin-top:5px}
.barf{height:100%;background:linear-gradient(90deg,var(--wc-blue),var(--green));border-radius:2px;transition:width .4s ease}
.ptot{font-size:17px;font-weight:900;color:var(--green);flex-shrink:0;min-width:34px;text-align:right;line-height:1}
.gap-tag{font-size:9px;color:var(--muted);text-align:right;margin-top:2px}

/* ── MATCH TABLE (FROZEN HEADER + COL) ──────────────────────── */
.tbl-scroll{
  overflow:auto;
  max-height:370px;
  border-radius:9px;
  border:1px solid var(--border);
  scrollbar-width:thin;
  scrollbar-color:var(--border2) transparent;
  -webkit-overflow-scrolling:touch;
}
.tbl-scroll::-webkit-scrollbar{width:5px;height:5px}
.tbl-scroll::-webkit-scrollbar-track{background:transparent}
.tbl-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:400px}
/* Frozen header row */
.tbl thead th{
  color:var(--muted);font-size:9.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  padding:8px 8px;border-bottom:2px solid var(--border2);text-align:center;white-space:nowrap;
  background:var(--card);
  position:sticky;top:0;z-index:4;
}
/* Frozen name column */
.tbl th:first-child{
  text-align:left;
  position:sticky;left:0;top:0;z-index:6;
  background:var(--card);
  border-right:2px solid var(--border2);
  min-width:90px;
}
/* Frozen total column */
.tbl th.tot-h{
  position:sticky;right:0;z-index:5;
  background:var(--card);
  border-left:2px solid var(--border2);
}
.tbl td{
  padding:6px 8px;border-bottom:1px solid var(--border);
  text-align:center;vertical-align:middle;background:var(--card);
}
.tbl td:first-child{
  text-align:left;font-weight:600;white-space:nowrap;
  position:sticky;left:0;z-index:2;
  background:var(--card);
  border-right:2px solid var(--border2);
}
.tbl td.tot-c{
  position:sticky;right:0;z-index:2;
  background:var(--card);
  border-left:2px solid var(--border2);
}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td,.tbl tr:hover td:first-child,.tbl tr:hover td.tot-c{background:#101525}
.pos{color:var(--green);font-weight:700}
.neg{color:var(--red);font-weight:700}
.zer{color:var(--muted)}
.na{color:var(--faint)}
.tot{color:var(--green);font-weight:900;font-size:12px}

/* Round chips + filter */
.round-filter{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.rchip{font-size:10px;padding:3px 9px;border-radius:5px;border:1px solid var(--border2);background:var(--card2);color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.rchip.on{background:var(--wc-blue);border-color:var(--wc-blue);color:#fff;font-weight:700}
.rchip:hover:not(.on){border-color:var(--wc-gold);color:var(--wc-gold)}
.round-chip{display:inline-block;font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(245,200,66,.12);color:var(--wc-gold);border:1px solid rgba(245,200,66,.25);margin-right:3px;vertical-align:middle}

/* ── TABS ────────────────────────────────────────────────────── */
.tabbar{display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabbar::-webkit-scrollbar{display:none}
.tab{padding:7px 12px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab.on{color:var(--wc-gold);border-bottom-color:var(--wc-gold)}
.tab:hover:not(.on){color:var(--text)}
.tp{display:none}.tp.on{display:block}

/* ── SELECT / H2H ────────────────────────────────────────────── */
select{background:var(--card2);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:6px 10px;font-size:12px;outline:none;cursor:pointer;max-width:100%}
select:focus{border-color:var(--wc-gold)}
.sel-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.hstat{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:7px;background:var(--card2);margin-bottom:5px}
.hstat .hl{flex:1;color:var(--muted);font-size:11px}
.hstat .hv{font-weight:700;font-size:13px}

/* ── FUN CARDS ───────────────────────────────────────────────── */
.fun-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:4px;transition:border-color .2s,transform .2s}
.fun-card:hover{border-color:rgba(245,200,66,.4);transform:translateY(-1px)}
.fun-icon{font-size:22px}
.fun-lbl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.fun-val{font-size:13px;font-weight:700;line-height:1.3;color:var(--text)}
.fun-sub{font-size:11px;color:var(--muted)}

/* ── CHART ────────────────────────────────────────────────────── */
.cw{position:relative;width:100%}

/* ── FORM TABLE (FROZEN HEADER + NAME COL) ──────────────────── */
.form-wrap{overflow:auto;max-height:300px;border-radius:9px;border:1px solid var(--border);scrollbar-width:thin;scrollbar-color:var(--border2) transparent;-webkit-overflow-scrolling:touch}
.form-wrap::-webkit-scrollbar{width:5px;height:5px}
.form-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.form-tbl{width:100%;border-collapse:collapse;font-size:11px;min-width:300px}
.form-tbl th{color:var(--muted);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:6px 8px;border-bottom:2px solid var(--border2);text-align:center;white-space:nowrap;background:var(--card);position:sticky;top:0;z-index:4}
.form-tbl th:first-child{text-align:left;position:sticky;left:0;top:0;z-index:6;background:var(--card);border-right:2px solid var(--border2);min-width:90px}
.form-tbl th.form-sum{position:sticky;right:80px;z-index:5;background:var(--card);border-left:1px solid var(--border2)}
.form-tbl th.form-trend{position:sticky;right:0;z-index:5;background:var(--card);border-left:2px solid var(--border2);min-width:70px}
.form-tbl td{padding:5px 8px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle;background:var(--card)}
.form-tbl td:first-child{text-align:left;font-weight:600;white-space:nowrap;position:sticky;left:0;z-index:2;background:var(--card);border-right:2px solid var(--border2)}
.form-tbl td.form-sum{position:sticky;right:80px;z-index:2;background:var(--card);border-left:1px solid var(--border2)}
.form-tbl td.form-trend{position:sticky;right:0;z-index:2;background:var(--card);border-left:2px solid var(--border2)}
.form-tbl tr:last-child td{border-bottom:none}
.form-tbl tr:hover td,.form-tbl tr:hover td:first-child,.form-tbl tr:hover td.form-sum,.form-tbl tr:hover td.form-trend{background:#101525}
.score-pill{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:22px;border-radius:4px;font-size:10px;font-weight:700;padding:0 4px}
.score-pill.pos{background:#042010;border:1px solid #0d3a1a;color:var(--green)}
.score-pill.neg{background:#160404;border:1px solid #360b0b;color:var(--red)}
.score-pill.zer{background:var(--card2);border:1px solid var(--border2);color:var(--muted)}
.score-pill.nil{background:var(--card2);border:1px solid var(--border);color:var(--faint)}

/* ── PODIUM ──────────────────────────────────────────────────── */
#podiumVis{padding:10px 0;height:100%}

/* ── LOADING ─────────────────────────────────────────────────── */
#loading{position:fixed;inset:0;background:#07090f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:300}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--wc-gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:var(--muted);font-size:13px}
#err-banner{display:none;background:var(--red-bg);border:1px solid var(--red-border);color:var(--red);padding:10px 16px;border-radius:8px;font-size:12px;margin-bottom:16px}

/* ── MOBILE ──────────────────────────────────────────────────── */
@media(max-width:600px){
  header{padding:8px 12px;gap:8px}
  .wc-logo{width:38px;height:38px}
  .logo-text .l2{font-size:16px}
  .logo-text .l3{display:none}
  main{padding:12px 10px}
  .card{padding:12px}
  .kpi .v{font-size:20px}
  .tbl-scroll{max-height:300px}
  .btn.ghost{font-size:10px;padding:5px 9px}
  .two{gap:12px}
  .ptot{font-size:15px}
}
@media(max-width:380px){
  .logo-text .l1{display:none}
  .refresh-note{display:none}
  .hright{gap:5px}
}
</style>
</head>
<body>

<div id="loading">
  <!-- FIFA WC 2026 styled badge -->
  <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="32" cy="32" r="30" fill="#003DA5"/>
    <circle cx="32" cy="32" r="30" fill="none" stroke="#F5C842" stroke-width="2"/>
    <!-- Trophy -->
    <path d="M22 13h20v3H22z" fill="#F5C842"/>
    <path d="M24 16h16v12c0 5-4 9-8 10-4-1-8-5-8-10V16z" fill="#F5C842"/>
    <path d="M18 17h6v7c0 2-.7 3.5-1.8 4.5L18 31V17z" fill="#F5C842" opacity=".65"/>
    <path d="M46 17h-6v7c0 2 .7 3.5 1.8 4.5L46 31V17z" fill="#F5C842" opacity=".65"/>
    <path d="M27 38h10v3H27z" fill="#F5C842"/>
    <path d="M24 41h16v3H24z" fill="#F5C842"/>
    <text x="32" y="59" fill="#F5C842" font-size="7" font-weight="900" text-anchor="middle" font-family="system-ui">2026</text>
  </svg>
  <div class="spinner"></div>
  <p id="load-msg">Loading your predictions…</p>
</div>

<header>
  <div class="logo-badge">
    <!-- FIFA WC 2026 badge -->
    <svg class="wc-logo" viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="23" cy="23" r="22" fill="#003DA5"/>
      <circle cx="23" cy="23" r="22" fill="none" stroke="#F5C842" stroke-width="1.5"/>
      <path d="M15 11h16v2.5H15z" fill="#F5C842"/>
      <path d="M17 13.5h12v9c0 3.8-2.5 7-6 8-3.5-1-6-4.2-6-8v-9z" fill="#F5C842"/>
      <path d="M12 14.5h5v5.5c0 1.5-.6 2.8-1.5 3.7L12 26V14.5z" fill="#F5C842" opacity=".65"/>
      <path d="M34 14.5h-5v5.5c0 1.5.6 2.8 1.5 3.7L34 26V14.5z" fill="#F5C842" opacity=".65"/>
      <path d="M20 31h6v2h-6z" fill="#F5C842"/>
      <path d="M18 33h10v2H18z" fill="#F5C842"/>
      <text x="23" y="43.5" fill="white" font-size="5.5" font-weight="900" text-anchor="middle" font-family="system-ui">2026</text>
    </svg>
    <div class="logo-text">
      <span class="l1">FIFA World Cup</span>
      <span class="l2">WC<span>2026</span></span>
      <span class="l3">Predictions Dashboard · USA 🇺🇸 CAN 🇨🇦 MEX 🇲🇽</span>
    </div>
  </div>
  <div class="hright">
    <span class="refresh-note" id="refresh-note"></span>
    <button class="btn ghost" onclick="exportCSV()" title="Download standings as CSV">⬇ Export</button>
    <button class="btn ghost" onclick="fetchSheet()" title="Refresh data">↻ Refresh</button>
    <div class="status-pill"><div class="dot" id="sdot"></div><span id="stxt">Loading…</span></div>
  </div>
</header>

<main>
  <div id="err-banner"></div>

  <!-- KPIs -->
  <div class="kpi-row" id="kpis"></div>

  <!-- Leaderboard + Chart tabs -->
  <div class="two-24">
    <div class="card" style="padding:14px">
      <div class="sec" style="margin-bottom:10px">🏆 Standings</div>
      <div class="lb" id="lb"></div>
    </div>
    <div class="card" style="padding:14px">
      <div class="tabbar">
        <div class="tab on"  onclick="showTab('prog',this)">📈 Progression</div>
        <div class="tab"     onclick="showTab('acc',this)">🎯 Accuracy</div>
        <div class="tab"     onclick="showTab('share',this)">🥧 Share</div>
        <div class="tab"     onclick="showTab('podium',this)">🏅 Podium</div>
      </div>
      <div class="tp on" id="tp-prog"><div class="cw" style="height:260px"><canvas id="cProg"></canvas></div></div>
      <div class="tp"    id="tp-acc"> <div class="cw" style="height:260px"><canvas id="cAcc"></canvas></div></div>
      <div class="tp"    id="tp-share"><div class="cw" style="height:260px"><canvas id="cShare"></canvas></div></div>
      <div class="tp"    id="tp-podium" style="height:260px"><div id="podiumVis"></div></div>
    </div>
  </div>

  <!-- Match-by-match table (frozen header + name col) -->
  <div class="card" style="margin-bottom:20px;padding:14px">
    <div class="sec" style="margin-bottom:8px">⚽ Match-by-match scores</div>
    <div class="round-filter" id="roundFilter"></div>
    <div class="tbl-scroll">
      <table class="tbl" id="mtbl">
        <thead id="mth"></thead>
        <tbody id="mtb"></tbody>
      </table>
    </div>
  </div>

  <!-- Radar + H2H -->
  <div class="two">
    <div class="card" style="padding:14px">
      <div class="sec" style="margin-bottom:10px">📡 Performance radar</div>
      <div class="sel-row">
        <select id="rSel" onchange="drawRadar()"><option value="">— select player —</option></select>
      </div>
      <div class="cw" style="height:200px"><canvas id="cRadar"></canvas></div>
      <div id="rStats" style="margin-top:10px"></div>
    </div>
    <div class="card" style="padding:14px">
      <div class="sec" style="margin-bottom:10px">⚔️ Head-to-head</div>
      <div class="sel-row">
        <select id="hA" onchange="drawH2H()"><option value="">— Player A —</option></select>
        <select id="hB" onchange="drawH2H()"><option value="">— Player B —</option></select>
      </div>
      <div class="cw" style="height:170px"><canvas id="cH2H"></canvas></div>
      <div id="h2hStats" style="margin-top:10px"></div>
    </div>
  </div>

  <!-- Recent form table -->
  <div class="card" style="margin-bottom:20px;padding:14px">
    <div class="sec" style="margin-bottom:10px">🔥 Recent form (last 5 matches)</div>
    <div class="form-wrap" id="formTable"></div>
  </div>

  <!-- Fun stats -->
  <div class="sec">⚡ Fun stats &amp; records</div>
  <div class="three" id="fun"></div>

  <div style="height:30px"></div>
</main>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTuWq9-pk8ae1hMuMWOsggR8Sbf4r1cEQF7Gw_-lo3v_QSSlncmacw4hwQqTKalHT64oYiWwv1ctcw0/pub?gid=0&single=true&output=csv";
const REFRESH_MS = 5 * 60 * 1000;

// ── PALETTE ───────────────────────────────────────────────────────────────────
const SERIES = ['#2a78d6','#1baf7a','#eda100','#7c3aed','#e34948','#e87ba4','#eb6834','#14b8a6','#a855f7','#22c55e'];
const AV_BG  = ['#041220','#041a0c','#180e00','#12082a','#160404','#0a0018','#180a04','#041212','#100418','#041204'];
const AV_FG  = ['#3b82f6','#22c55e','#f59e0b','#a855f7','#ef4444','#c084fc','#f97316','#14b8a6','#e879f9','#4ade80'];

// ── STATE ─────────────────────────────────────────────────────────────────────
let S = { players:[], matches:[] };
let C = {};
let timer = null;
let activeRound = 'all';

// ── FETCH ─────────────────────────────────────────────────────────────────────
function fetchSheet() {
  setStatus('', 'Refreshing…');
  fetch(SHEET_URL + '&_=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(csv => {
      parseCSV(csv);
      render();
      setStatus('live', 'Live · 5 min refresh');
      document.getElementById('refresh-note').textContent = 'Updated ' + new Date().toLocaleTimeString();
      document.getElementById('loading').style.display = 'none';
      hideErr();
    })
    .catch(e => {
      document.getElementById('loading').style.display = 'none';
      showErr('Could not load sheet: ' + e.message + '. Ensure it is published as CSV.');
      setStatus('err', 'Error');
    });
}

// ── PARSE ─────────────────────────────────────────────────────────────────────
function parseCSV(csv) {
  const lines = csv.trim().split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return;
  const headers = splitCSV(lines[0]);

  const matchCols = headers.slice(2).map((h, i) => ({
    idx  : i + 2,
    label: h.trim() || ('Match ' + (i + 1)),
    round: detectRound(h.trim())
  }));

  S.matches = matchCols;
  S.players = [];

  for (let r = 1; r < lines.length; r++) {
    const row  = splitCSV(lines[r]);
    const name = (row[0] || '').trim();
    if (!name) continue;

    const initial  = Number((row[1] || '').replace(/,/g,'').replace(/[^0-9.-]/g,'')) || 0;

    const matchPts = matchCols.map(m => {
      const raw = (row[m.idx] || '').trim();
      if (!raw || raw === '-' || raw === '–') return null;
      const v = Number(raw);
      return isNaN(v) ? null : v;
    });

    const earned   = matchPts.reduce((s,v) => s + (v ?? 0), 0);
    const played   = matchPts.filter(v => v !== null).length;
    const positive = matchPts.filter(v => v !== null && v > 0).length;  // +ve results
    const negative = matchPts.filter(v => v !== null && v < 0).length;  // -ve results
    const zero     = matchPts.filter(v => v === 0).length;              // neutral (0)

    S.players.push({ name, initial, matchPts, earned, total: initial + earned, played, positive, negative, zero });
  }

  S.players.sort((a, b) => b.total - a.total);
}

function detectRound(label) {
  const l = label.toLowerCase();
  if (l.includes('final') && !l.includes('semi') && !l.includes('quarter')) return 'Final';
  if (l.includes('semi'))                                   return 'SF';
  if (l.includes('quarter') || l.includes('qf'))           return 'QF';
  if (l.includes('r16') || l.includes('round of 16'))      return 'R16';
  if (l.includes('r32') || l.includes('round of 32'))      return 'R32';
  if (l.includes('group'))                                  return 'Group';
  return '';
}

function shortLabel(label) {
  // Already short (≤8 chars) — use as-is
  if (label.length <= 8) return label;
  // Common patterns: "R32-M1 : Brazil vs Japan" → "R32-M1"
  const colonPart = label.split(':')[0].trim();
  if (colonPart.length <= 8) return colonPart;
  // Extract round+number pattern: "R-32 Match 1" → "R32-M1"
  const m = label.match(/[Rr][-]?(\d+)[^\d]*[Mm](?:atch\s*)?(\d+)/);
  if (m) return `R${m[1]}-M${m[2]}`;
  // QF/SF/Final patterns
  if (/quarter/i.test(label)) { const n=label.match(/\d+/); return 'QF'+(n?n[0]:''); }
  if (/semi/i.test(label))    { const n=label.match(/\d+/); return 'SF'+(n?n[0]:''); }
  if (/final/i.test(label))   return 'Final';
  // Fallback: first 8 chars
  return label.slice(0,8);
}

function splitCSV(line) {
  const res = []; let cur = '', inQ = false;
  for (const c of line) {
    if (c === '"') inQ = !inQ;
    else if (c === ',' && !inQ) { res.push(cur.trim()); cur = ''; }
    else cur += c;
  }
  res.push(cur.trim());
  return res;
}

function setStatus(s, t) {
  const d = document.getElementById('sdot');
  d.className = 'dot' + (s==='live' ? ' live' : s==='err' ? ' err' : '');
  document.getElementById('stxt').textContent = t;
}
function showErr(m) { const e=document.getElementById('err-banner'); e.textContent='⚠ '+m; e.style.display='block'; }
function hideErr()  { document.getElementById('err-banner').style.display='none'; }

// ── RENDER ALL ────────────────────────────────────────────────────────────────
function render() {
  renderKPIs();
  renderLB();
  renderRoundFilter();
  renderMatchTable();
  populateSelects();
  drawProg();
  drawAcc();
  drawShare();
  renderPodium();
  drawRadar();
  drawH2H();
  renderFormTable();
  renderFun();
}

// ── KPIs ──────────────────────────────────────────────────────────────────────
function renderKPIs() {
  const p = S.players, n = p.length;
  if (!n) return;

  const played   = S.matches.filter((_,i) => p.some(pl => pl.matchPts[i] !== null)).length;
  const allPts   = p.flatMap(pl => pl.matchPts.filter(v => v !== null));
  const avg      = allPts.length ? (allPts.reduce((a,b)=>a+b,0)/allPts.length).toFixed(1) : '–';
  const gap      = p[0].total - p[n-1].total;

  // Hottest player: best sum over last 5 played matches
  const hottest = [...p].sort((a,b) => {
    const s5 = pl => pl.matchPts.filter(v=>v!==null).slice(-5).reduce((s,v)=>s+v,0);
    return s5(b) - s5(a);
  })[0];

  // Total +ve vs -ve across all players
  const totalPos = p.reduce((s,pl)=>s+pl.positive,0);
  const totalNeg = p.reduce((s,pl)=>s+pl.negative,0);

  document.getElementById('kpis').innerHTML = `
    <div class="kpi g"><div class="v g">${p[0].total}</div><div class="l">Leader pts</div></div>
    <div class="kpi a"><div class="v a" style="font-size:${p[0].name.length>8?'15px':'20px'}">${p[0].name.split(' ')[0]}</div><div class="l">🏆 Leader</div></div>
    <div class="kpi b"><div class="v b">${played}<span style="font-size:14px;font-weight:400;color:var(--muted)">/${S.matches.length}</span></div><div class="l">Matches scored</div></div>
    <div class="kpi p"><div class="v p">${avg}</div><div class="l">Avg pts/match</div></div>
    <div class="kpi r"><div class="v r">${gap}</div><div class="l">1st–last gap</div></div>
    <div class="kpi wg"><div class="v" style="color:var(--wc-gold);font-size:${hottest&&hottest.name.length>8?'14px':'20px'}">${hottest?hottest.name.split(' ')[0]:'–'}</div><div class="l">🔥 Hottest (L5)</div></div>
  `;
}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
function renderLB() {
  const p   = S.players;
  const max = p[0]?.total || 1;
  // Valid match indices (progression matches)
  const validIdx = S.matches.map((_,i)=>i).filter(i => p.some(pl => pl.matchPts[i] !== null));
  const last5idx = validIdx.slice(-5);

  document.getElementById('lb').innerHTML = p.map((pl, i) => {
    const medal    = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    const initials = pl.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const pct      = Math.max(0, Math.round(Math.max(0,pl.total) / Math.max(1,max) * 100));
    const gapStr   = i===0 ? '' : `−${p[0].total - pl.total}`;

    // Form dots: last 5 matches played
    const formDots = last5idx.map(mi => {
      const v = pl.matchPts[mi];
      if (v === null) return `<div class="fd null" title="No entry"></div>`;
      const cls = v>0?'pos':v<0?'neg':'zer';
      const tip = v>0?`+${v}`:String(v);
      return `<div class="fd ${cls}" title="${tip}"></div>`;
    }).join('');

    return `<div class="lbr ${i===0?'leader':''}">
      <div class="rnk ${i<3?'top':''}">${medal||('#'+(i+1))}</div>
      <div class="av" style="background:${AV_BG[i%10]};color:${AV_FG[i%10]}">${initials}</div>
      <div style="flex:1;min-width:0">
        <div class="pname">${pl.name}</div>
        <div class="pdet">
          <span style="color:var(--green)">▲${pl.positive}</span>
          <span style="color:var(--red)">▼${pl.negative}</span>
          <span style="color:#5a6aaa">■${pl.zero}</span>
          ${pl.initial ? `<span style="color:var(--amber)">+${pl.initial} base</span>` : ''}
        </div>
        <div class="form-dots">${formDots}</div>
        <div class="barw"><div class="barf" style="width:${pct}%"></div></div>
      </div>
      <div style="text-align:right;flex-shrink:0;min-width:38px">
        <div class="ptot">${pl.total}</div>
        <div class="gap-tag">${gapStr}</div>
      </div>
    </div>`;
  }).join('');
}

// ── ROUND FILTER ──────────────────────────────────────────────────────────────
function renderRoundFilter() {
  const rounds = [...new Set(S.matches.map(m => m.round).filter(Boolean))];
  const rf = document.getElementById('roundFilter');
  if (!rounds.length) { rf.innerHTML=''; return; }
  rf.innerHTML = ['all', ...rounds].map(r =>
    `<div class="rchip ${activeRound===r?'on':''}" onclick="setRound('${r}')">${r==='all'?'All rounds':r}</div>`
  ).join('');
}

function setRound(r) {
  activeRound = r;
  renderRoundFilter();
  renderMatchTable();
}

// ── MATCH TABLE (FROZEN HEADER ROW + NAME COLUMN) ─────────────────────────────
function renderMatchTable() {
  const filtered = activeRound === 'all'
    ? S.matches
    : S.matches.filter(m => m.round === activeRound);

  if (!filtered.length) {
    document.getElementById('mth').innerHTML = '';
    document.getElementById('mtb').innerHTML =
      `<tr><td colspan="2" style="text-align:center;color:var(--muted);padding:24px">No matches in this round yet</td></tr>`;
    return;
  }

  // Header row — frozen via CSS (position:sticky top:0 on th, left:0 on first th)
  const thCells = filtered.map(m => {
    const chip = m.round ? `<span class="round-chip">${m.round}</span>` : '';
    return `<th title="${m.label}">${chip}${m.label}</th>`;
  }).join('');
  document.getElementById('mth').innerHTML =
    `<tr><th>Player</th>${thCells}<th class="tot-h">Total</th></tr>`;

  // Body rows — first td frozen via CSS (position:sticky left:0), last td frozen (right:0)
  document.getElementById('mtb').innerHTML = S.players.map(pl => {
    const cells = filtered.map(m => {
      const v = pl.matchPts[S.matches.indexOf(m)];
      if (v === null) return `<td class="na">–</td>`;
      if (v > 0)      return `<td class="pos">+${v}</td>`;
      if (v < 0)      return `<td class="neg">${v}</td>`;
      return `<td class="zer">0</td>`;
    }).join('');
    return `<tr><td>${pl.name}</td>${cells}<td class="tot-c tot">${pl.total}</td></tr>`;
  }).join('');
}

// ── SELECTS ───────────────────────────────────────────────────────────────────
function populateSelects() {
  const opts = S.players.map((p,i) => `<option value="${i}">${p.name}</option>`).join('');
  [['rSel','— select player —'],['hA','— Player A —'],['hB','— Player B —']].forEach(([id,blank]) => {
    document.getElementById(id).innerHTML = `<option value="">${blank}</option>` + opts;
  });
}

// ── EXPORT CSV ────────────────────────────────────────────────────────────────
function exportCSV() {
  if (!S.players.length) return;
  const header = ['Player', 'Base Pts', ...S.matches.map(m=>m.label), 'Total'];
  const rows   = S.players.map(p => [
    p.name, p.initial, ...p.matchPts.map(v => v ?? ''), p.total
  ]);
  const csv = [header, ...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const a   = document.createElement('a');
  a.href    = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download= 'wc2026-predictions.csv';
  a.click();
}

// ── CHARTS ────────────────────────────────────────────────────────────────────
const GR = '#1c2540', TC = '#5a6a8e';

function kill(k) { if (C[k]) { C[k].destroy(); delete C[k]; } }

function baseOpts(showLegend = false) {
  const legendCfg = showLegend
    ? { display:true, position:'bottom', labels:{ color:TC, font:{size:10}, boxWidth:10, padding:7 } }
    : { display:false };
  return {
    responsive: true, maintainAspectRatio: false,
    plugins:{
      legend: legendCfg,
      tooltip:{ backgroundColor:'#0d1120', borderColor:'#263055', borderWidth:1,
                titleColor:'#eef0f8', bodyColor:'#6a7a9e', padding:10 }
    },
    scales:{
      x:{ grid:{color:GR}, ticks:{color:TC,font:{size:10},maxRotation:40}, border:{color:GR} },
      y:{ grid:{color:GR}, ticks:{color:TC,font:{size:10}}, border:{color:GR} }
    }
  };
}

// PROGRESSION — only include matches where ≥1 player has a non-null value
function drawProg() {
  kill('prog');
  if (!S.players.length || !S.matches.length) return;

  const validIdx = S.matches.map((_,i)=>i).filter(i => S.players.some(p => p.matchPts[i] !== null));
  if (!validIdx.length) return;

  // Start from 0, then Group Stage point, then match-by-match
  const hasInitial = S.players.some(p => p.initial > 0);
  const progLabels = ['Start', ...(hasInitial ? ['⭐ Group Stage'] : []), ...validIdx.map(i => shortLabel(S.matches[i].label))];
  const datasets = S.players.map((p, i) => {
    const pts = [0];
    if (hasInitial) pts.push(p.initial);
    let cum = p.initial;
    validIdx.forEach(mi => { cum += (p.matchPts[mi] ?? 0); pts.push(cum); });
    return { label:p.name, data:pts, borderColor:SERIES[i%10], backgroundColor:'transparent',
             borderWidth:2, pointRadius:3, pointBackgroundColor:SERIES[i%10], tension:.35 };
  });
  const labels = progLabels;

  C.prog = new Chart(document.getElementById('cProg').getContext('2d'),
    { type:'line', data:{ labels:progLabels, datasets }, options:baseOpts(true) });
}

// ACCURACY — positive vs negative matches per player
function drawAcc() {
  kill('acc');
  if (!S.players.length) return;
  C.acc = new Chart(document.getElementById('cAcc').getContext('2d'), {
    type: 'bar',
    data: {
      labels: S.players.map(p => p.name.split(' ')[0]),
      datasets: [
        { label:'Positive (+ve)', data:S.players.map(p=>p.positive), backgroundColor:S.players.map((_,i)=>SERIES[i%10]+'cc'), borderRadius:3 },
        { label:'Negative (-ve)', data:S.players.map(p=>p.negative), backgroundColor:'#3a1010', borderRadius:3 },
      ]
    },
    options: baseOpts(true)
  });
}

// SHARE — points distribution doughnut
function drawShare() {
  kill('share');
  if (!S.players.length) return;
  const vals  = S.players.map(p => Math.max(0, p.total));
  const total = vals.reduce((a,b)=>a+b,0) || 1;
  C.share = new Chart(document.getElementById('cShare').getContext('2d'), {
    type: 'doughnut',
    data: { labels:S.players.map(p=>p.name), datasets:[{
      data: vals, backgroundColor:S.players.map((_,i)=>SERIES[i%10]),
      borderColor:'#0d1120', borderWidth:3, hoverOffset:6
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{ display:true, position:'bottom', labels:{color:TC,font:{size:10},boxWidth:10,padding:8} },
        tooltip:{ backgroundColor:'#0d1120',borderColor:'#263055',borderWidth:1,
          titleColor:'#eef0f8',bodyColor:'#6a7a9e',
          callbacks:{ label:c => ` ${c.label}: ${c.parsed}pts (${Math.round(c.parsed/total*100)}%)` }
        }
      }
    }
  });
}

// PODIUM
function renderPodium() {
  const el = document.getElementById('podiumVis');
  if (!S.players.length) { el.innerHTML=''; return; }
  const top3 = S.players.slice(0, Math.min(3, S.players.length));
  const orderMap = top3.length >= 3 ? [1, 0, 2] : top3.length === 2 ? [1, 0] : [0];
  const orderPlayers = orderMap.map(i => top3[i]);
  const heights = [70, 100, 50];
  const colors  = ['#C0C0C0','#F5C842','#CD7F32'];
  const medals  = ['🥈','🥇','🥉'];

  el.style.cssText = 'display:flex;align-items:flex-end;justify-content:center;gap:10px;padding:10px 8px 0;height:240px';
  el.innerHTML = orderPlayers.map((pl, vi) => {
    const ri      = top3.indexOf(pl);
    const h       = vi===1 ? 100 : vi===0 ? 70 : 50;
    const c       = colors[ri];
    const initials= pl.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;max-width:100px">
      <div style="font-size:20px">${medals[ri]||''}</div>
      <div style="width:38px;height:38px;border-radius:50%;background:${AV_BG[ri%10]};color:${AV_FG[ri%10]};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid ${c};flex-shrink:0">${initials}</div>
      <div style="font-size:10px;color:#fff;font-weight:700;text-align:center;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px">${pl.name.split(' ')[0]}</div>
      <div style="font-size:12px;font-weight:900;color:${c}">${pl.total}pts</div>
      <div style="width:100%;flex:1;max-height:${h}px;background:linear-gradient(180deg,${c}33,${c}11);border:1px solid ${c}44;border-bottom:none;border-radius:5px 5px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:6px">
        <span style="font-size:12px;font-weight:900;color:${c}44">${ri+1}</span>
      </div>
    </div>`;
  }).join('');
}

function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.querySelectorAll('.tp').forEach(tp => tp.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tp-'+name).classList.add('on');
  if (name==='prog')   drawProg();
  if (name==='acc')    drawAcc();
  if (name==='share')  drawShare();
  if (name==='podium') renderPodium();
}

// RADAR
function drawRadar() {
  kill('radar');
  const sel = document.getElementById('rSel').value;
  if (sel === '') return;
  const p   = S.players[+sel];
  const max = Math.max(1, S.players[0].total);

  const posRate    = p.played ? Math.round(p.positive / p.played * 100) : 0;
  const stability  = p.played ? Math.round((p.played - p.negative) / p.played * 100) : 100;
  const partRate   = Math.round(p.played / (S.matches.length || 1) * 100);
  const ptsPct     = Math.round(Math.max(0, p.total) / max * 100);
  const basePct    = p.initial > 0 ? Math.min(100, 50 + Math.round(p.initial / max * 50)) : 40;

  const color = SERIES[+sel%10];
  C.radar = new Chart(document.getElementById('cRadar').getContext('2d'), {
    type: 'radar',
    data: {
      labels: ['Points','Positive rate','Participation','Stability','Base pts'],
      datasets: [{ label:p.name, data:[ptsPct,posRate,partRate,stability,basePct],
        borderColor:color, backgroundColor:color+'2a', borderWidth:2,
        pointBackgroundColor:color, pointRadius:4 }]
    },
    options: { responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{ r:{ min:0,max:100,ticks:{display:false},
        grid:{color:GR}, angleLines:{color:GR}, pointLabels:{color:TC,font:{size:10}} } }
    }
  });

  document.getElementById('rStats').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
      ${[['Total pts',p.total],['Match earned',p.earned],['Base pts',p.initial],
         ['Positive (+ve)',p.positive],['Negative (-ve)',p.negative],['Matches voted',p.played]].map(([l,v])=>
        `<div class="hstat"><span class="hl">${l}</span><span class="hv">${v}</span></div>`
      ).join('')}
    </div>`;
}

// H2H
function drawH2H() {
  kill('h2h');
  const ai = document.getElementById('hA').value;
  const bi = document.getElementById('hB').value;
  if (ai===''||bi==='') return;
  const a = S.players[+ai], b = S.players[+bi];

  // Only show matches where at least one has data
  const validIdx = S.matches.map((_,i)=>i).filter(i => a.matchPts[i]!==null || b.matchPts[i]!==null);
  const labels   = validIdx.map(i => shortLabel(S.matches[i].label));

  C.h2h = new Chart(document.getElementById('cH2H').getContext('2d'), {
    type: 'bar',
    data: { labels, datasets:[
      { label:a.name, data:validIdx.map(i=>a.matchPts[i]??0), backgroundColor:SERIES[+ai%10]+'bb', borderRadius:3 },
      { label:b.name, data:validIdx.map(i=>b.matchPts[i]??0), backgroundColor:SERIES[+bi%10]+'bb', borderRadius:3 },
    ]},
    options: baseOpts(true)
  });

  let aW=0, bW=0, tie=0;
  validIdx.forEach(i => {
    const av=a.matchPts[i], bv=b.matchPts[i];
    if(av===null||bv===null) return;
    if(av>bv) aW++; else if(bv>av) bW++; else tie++;
  });
  const leader = a.total >= b.total ? a : b;
  document.getElementById('h2hStats').innerHTML = [
    [a.name + ' total',           a.total + 'pts'],
    [b.name + ' total',           b.total + 'pts'],
    ['Match wins – '+a.name.split(' ')[0], aW],
    ['Match wins – '+b.name.split(' ')[0], bW],
    ['Tied matches',              tie],
    ['Points lead',               Math.abs(a.total-b.total)+'pts ('+leader.name.split(' ')[0]+')'],
  ].map(([l,v]) => `<div class="hstat"><span class="hl">${l}</span><span class="hv">${v}</span></div>`).join('');
}

// ── RECENT FORM TABLE ─────────────────────────────────────────────────────────
function renderFormTable() {
  const p = S.players;
  if (!p.length) { document.getElementById('formTable').innerHTML=''; return; }

  const validIdx = S.matches.map((_,i)=>i).filter(i => p.some(pl => pl.matchPts[i] !== null));
  const last5    = validIdx.slice(-5);
  if (!last5.length) { document.getElementById('formTable').innerHTML='<p style="color:var(--muted);font-size:12px">No match data yet.</p>'; return; }

  const labels = last5.map(i => shortLabel(S.matches[i].label));

  // Sort by last-5 sum descending
  const sorted = [...p].sort((a,b) => {
    const s = pl => last5.reduce((acc,i) => acc + (pl.matchPts[i]??0), 0);
    return s(b) - s(a);
  });

  function pill(v) {
    if (v===null) return `<span class="score-pill nil">–</span>`;
    const cls = v>0?'pos':v<0?'neg':'zer';
    return `<span class="score-pill ${cls}">${v>0?'+':''}${v}</span>`;
  }

  let html = `<table class="form-tbl">
    <thead><tr>
      <th>Player</th>
      ${labels.map(l=>`<th>${l}</th>`).join('')}
      <th class="form-sum">L5 Sum</th>
      <th class="form-trend">Trend</th>
    </tr></thead><tbody>`;

  sorted.forEach(pl => {
    const sum = last5.reduce((acc,i) => acc + (pl.matchPts[i]??0), 0);
    const sumCol = sum>0?'var(--green)':sum<0?'var(--red)':'var(--muted)';
    // Trend: compare first half vs second half of last 5
    const first  = last5.slice(0, Math.floor(last5.length/2)).reduce((acc,i)=>acc+(pl.matchPts[i]??0),0);
    const second = last5.slice(Math.floor(last5.length/2)).reduce((acc,i)=>acc+(pl.matchPts[i]??0),0);
    const trend  = second>first?'↑ Hot':second<first?'↓ Cold':'→ Same';
    const tCol   = second>first?'var(--green)':second<first?'var(--red)':'var(--muted)';
    html += `<tr>
      <td>${pl.name}</td>
      ${last5.map(i => `<td>${pill(pl.matchPts[i])}</td>`).join('')}
      <td class="form-sum" style="font-weight:700;color:${sumCol}">${sum>0?'+':''}${sum}</td>
      <td class="form-trend" style="color:${tCol};font-size:11px;font-weight:600">${trend}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('formTable').innerHTML = html;
}

// ── FUN STATS & RECORDS ───────────────────────────────────────────────────────
// All tied players are shown for every award
function renderFun() {
  const p = S.players;
  if (!p.length) return;

  // Helpers
  const names = arr => arr.map(x=>x.name).join(' & ');
  function allWithMax(fn) {
    const mx = Math.max(...p.map(fn));
    return { players: p.filter(x=>fn(x)===mx), val: mx };
  }
  function allWithMin(fn) {
    const mn = Math.min(...p.map(fn));
    return { players: p.filter(x=>fn(x)===mn), val: mn };
  }

  // Best & worst single match
  let bestPts=-Infinity, bestMeta=[];
  let worstPts=Infinity, worstMeta=[];
  p.forEach(pl => {
    pl.matchPts.forEach((v,i) => {
      if (v===null) return;
      if (v>bestPts)       { bestPts=v;  bestMeta=[{name:pl.name,match:S.matches[i]?.label||'M'+(i+1)}]; }
      else if (v===bestPts) bestMeta.push({name:pl.name,match:S.matches[i]?.label||'M'+(i+1)});
      if (v<worstPts)       { worstPts=v; worstMeta=[{name:pl.name,match:S.matches[i]?.label||'M'+(i+1)}]; }
      else if (v===worstPts) worstMeta.push({name:pl.name,match:S.matches[i]?.label||'M'+(i+1)});
    });
  });

  // Longest positive streak ever
  let longestStreak = 0, longestPlayers = [];
  p.forEach(pl => {
    let cur=0, mx=0;
    pl.matchPts.forEach(v => { if(v!==null&&v>0){cur++;if(cur>mx)mx=cur;}else cur=0; });
    if (mx>longestStreak)      { longestStreak=mx; longestPlayers=[pl.name]; }
    else if (mx===longestStreak&&mx>0) longestPlayers.push(pl.name);
  });

  // Current ongoing streak
  function curStreak(pl) {
    const played = pl.matchPts.filter(v=>v!==null);
    if (!played.length) return {len:0,type:'none'};
    const last = played[played.length-1];
    const type = last>0?'pos':last<0?'neg':'zer';
    let len=0;
    for (let i=played.length-1;i>=0;i--) {
      const ok = type==='pos'?played[i]>0:type==='neg'?played[i]<0:played[i]===0;
      if (ok) len++; else break;
    }
    return {len,type};
  }
  let hotLen=0, hotPlayers=[];
  p.forEach(pl => {
    const cs = curStreak(pl);
    if (cs.type==='pos') {
      if (cs.len>hotLen)      { hotLen=cs.len; hotPlayers=[pl.name]; }
      else if (cs.len===hotLen) hotPlayers.push(pl.name);
    }
  });

  const mosPos    = allWithMax(x=>x.positive);
  const mosNeg    = allWithMax(x=>x.negative);
  const mosActive = allWithMax(x=>x.played);
  const topEarner = allWithMax(x=>x.earned);
  const worstGap  = allWithMin(x=>x.total);

  const cards = [
    { icon:'🏆', lbl:'Overall leader',          val:p[0].name,                         sub:p[0].total+'pts total' },
    /* best single match removed */
    mosPos.players.length ? { icon:'🎯', lbl:'Most positive matches', val:names(mosPos.players),           sub:`${mosPos.val} positive result${mosPos.val!==1?'s':''}` } : null,
    /* top match earner removed */
    longestPlayers.length&&longestStreak>0 ? { icon:'🔥', lbl:'Longest positive streak', val:longestPlayers.join(' & '), sub:`${longestStreak} in a row` } : null,
    hotPlayers.length&&hotLen>0 ? { icon:'🌶️', lbl:'On fire right now',   val:hotPlayers.join(' & '),      sub:`${hotLen} consecutive positive` } : null,
    mosNeg.players.length ? { icon:'😬', lbl:'Most negative matches', val:names(mosNeg.players),           sub:`${mosNeg.val} negative result${mosNeg.val!==1?'s':''}` } : null,
    /* most active voter removed */
    /* worst single match removed */
    p.length>1 ? { icon:'⚔️', lbl:'Closest rivals',
      val:`${p[p.length-2].name} vs ${p[p.length-1].name}`,
      sub:`${Math.abs(p[p.length-2].total-p[p.length-1].total)}pt gap` } : null,
    p.length>1 ? { icon:'📉', lbl:'Points gap to leader',
      val:names(worstGap.players),
      sub:`${p[0].total - worstGap.val}pts behind` } : null,
  ].filter(Boolean);

  document.getElementById('fun').innerHTML = cards.map(c => `
    <div class="fun-card">
      <div class="fun-icon">${c.icon}</div>
      <div class="fun-lbl">${c.lbl}</div>
      <div class="fun-val">${c.val}</div>
      <div class="fun-sub">${c.sub}</div>
    </div>`).join('');
}
